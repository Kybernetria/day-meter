name: Release Android app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    name: Build, sign, attest, and release
    runs-on: ubuntu-latest
    environment: release
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    steps:
      - name: Require a version tag
        if: github.ref_type != 'tag'
        run: |
          echo "Run this workflow from an existing v<version> tag."
          exit 1

      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android build dependencies
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Verify tag matches app version
        run: |
          version_name="$(sed -nE 's/^[[:space:]]*versionName[[:space:]]+"([^"]+)".*/\1/p' app/build.gradle)"
          test -n "$version_name"
          test "$GITHUB_REF_NAME" = "v$version_name"

      - name: Restore release keystore
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/day-meter-release.jks
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$RELEASE_STORE_PASSWORD" ] || [ -z "$RELEASE_KEY_ALIAS" ] || [ -z "$RELEASE_KEY_PASSWORD" ]; then
            echo "::error title=Missing signing secret::Configure all four release-signing secrets before creating a release."
            exit 1
          fi
          umask 077
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RELEASE_STORE_FILE"
          test -s "$RELEASE_STORE_FILE"
          keytool -list -keystore "$RELEASE_STORE_FILE" -storepass "$RELEASE_STORE_PASSWORD" -alias "$RELEASE_KEY_ALIAS" >/dev/null

      - name: Build signed release APK and App Bundle
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/day-meter-release.jks
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Prepare release files and checksums
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/day-meter-${GITHUB_REF_NAME}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "dist/day-meter-${GITHUB_REF_NAME}.aab"
          sha256sum --binary dist/day-meter-* > "dist/day-meter-${GITHUB_REF_NAME}-SHA256SUMS.txt"

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.apk
            dist/*.aab
            dist/*-SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag \
            --title "Day Meter ${GITHUB_REF_NAME#v}" \
            --generate-notes
